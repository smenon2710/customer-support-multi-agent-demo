version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=tableau_support
      - POSTGRES_PASSWORD=tableau_support_dev
      - POSTGRES_DB=tableau_support
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tableau_support"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-seed:
    build:
      context: .
      dockerfile: scripts/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://tableau_support:tableau_support_dev@postgres:5432/tableau_support

  router-agent:
    build:
      context: .
      dockerfile: agents/router_agent/Dockerfile
    ports:
      - "8001:8001"
    depends_on:
      redis:
        condition: service_healthy
      db-seed:
        condition: service_completed_successfully
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://tableau_support:tableau_support_dev@postgres:5432/tableau_support
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - CLASSIFIER_MODEL=${CLASSIFIER_MODEL:-meta-llama/llama-3.3-70b-instruct:free}
      - GENERATION_MODEL=${GENERATION_MODEL:-meta-llama/llama-3.3-70b-instruct:free}

  technical-agent:
    build:
      context: .
      dockerfile: agents/technical_agent/Dockerfile
    ports:
      - "8002:8002"
    depends_on:
      redis:
        condition: service_healthy
      db-seed:
        condition: service_completed_successfully
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://tableau_support:tableau_support_dev@postgres:5432/tableau_support
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - CLASSIFIER_MODEL=${CLASSIFIER_MODEL:-meta-llama/llama-3.3-70b-instruct:free}
      - GENERATION_MODEL=${GENERATION_MODEL:-meta-llama/llama-3.3-70b-instruct:free}

  account-agent:
    build:
      context: .
      dockerfile: agents/account_agent/Dockerfile
    ports:
      - "8003:8003"
    depends_on:
      redis:
        condition: service_healthy
      db-seed:
        condition: service_completed_successfully
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://tableau_support:tableau_support_dev@postgres:5432/tableau_support
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - CLASSIFIER_MODEL=${CLASSIFIER_MODEL:-meta-llama/llama-3.3-70b-instruct:free}
      - GENERATION_MODEL=${GENERATION_MODEL:-meta-llama/llama-3.3-70b-instruct:free}

  demo-app:
    build:
      context: .
      dockerfile: demo/Dockerfile
    ports:
      - "8501:8501"
    depends_on:
      - router-agent
      - technical-agent
      - account-agent
    environment:
      - ROUTER_URL=http://router-agent:8001
      - TECHNICAL_URL=http://technical-agent:8002
      - ACCOUNT_URL=http://account-agent:8003
      - DATABASE_URL=postgresql://tableau_support:tableau_support_dev@postgres:5432/tableau_support

volumes:
  postgres-data:
