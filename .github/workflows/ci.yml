name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements-dev.txt
      - run: ruff check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: pytest
        # No secrets needed — the suite never makes real network calls. With no
        # OPENROUTER_API_KEY, every LLM-touching test exercises the real
        # rules-only fallback path (see shared/llm_client.py).

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build

  llm-smoke-test:
    runs-on: ubuntu-latest
    # The secrets context isn't allowed in any `if:` expression, job- or
    # step-level (GitHub Actions rejects the whole workflow file if you try) —
    # so the secret is copied into an env var here, and the gate below checks
    # that instead.
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Run live LLM smoke test
        if: ${{ env.OPENROUTER_API_KEY != '' }}
        run: python -m scripts.llm_smoke_test
